<svg xmlns='http://www.w3.org/2000/svg' width='1000' height='600' viewBox='0 0 1000 600'><rect width='1000' height='600' fill='#0f1419'/><defs><marker id='ah' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#4a9eff'/></marker><marker id='ahg' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#3ddc97'/></marker><marker id='aha' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#ffb454'/></marker></defs><text x='26' y='38' text-anchor='start' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='21' font-weight='600'>Context vs Conversation</text><text x='26' y='58' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='12' font-weight='400'>the durable, multi-writer side vs the live, append-only side shipped to the model</text><rect x='50' y='86' width='470' height='360' rx='8' fill='#101822' stroke='#3ddc97' stroke-width='1.5'/><text x='285.0' y='271.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='15' font-weight='600'></text><text x='70' y='114' text-anchor='start' fill='#3ddc97' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='15' font-weight='600'>CONTEXT  (durable)</text><text x='70' y='132' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='400'>CRDT block log + metadata · multi-writer · journaled to oplog</text><rect x='68' y='148' width='100' height='34' rx='6' fill='#222d3d' stroke='#4a9eff' stroke-width='1'/><text x='118.0' y='169.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='12'>user</text><line x1='118' y1='182' x2='118' y2='214' stroke='#8a9bb0' stroke-width='1.4'  marker-end='url(#ah)'/><rect x='176' y='148' width='100' height='34' rx='6' fill='#222d3d' stroke='#7c5cff' stroke-width='1'/><text x='226.0' y='169.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='12'>model</text><line x1='226' y1='182' x2='226' y2='214' stroke='#8a9bb0' stroke-width='1.4'  marker-end='url(#ah)'/><rect x='284' y='148' width='100' height='34' rx='6' fill='#222d3d' stroke='#ffb454' stroke-width='1'/><text x='334.0' y='169.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='12'>tool calls</text><line x1='334' y1='182' x2='285' y2='214' stroke='#8a9bb0' stroke-width='1.4'  marker-end='url(#ah)'/><rect x='392' y='148' width='100' height='34' rx='6' fill='#222d3d' stroke='#ff6b9d' stroke-width='1'/><text x='442.0' y='169.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='12'>sibling agents</text><line x1='442' y1='182' x2='285' y2='214' stroke='#8a9bb0' stroke-width='1.4'  marker-end='url(#ah)'/><text x='285' y='206' text-anchor='middle' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>merge</text><rect x='110' y='224' width='300' height='30' rx='6' fill='#1a2230' stroke='#4a9eff' stroke-width='1'/><text x='260.0' y='243.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11'>block · Text</text><rect x='110' y='262' width='300' height='30' rx='6' fill='#1a2230' stroke='#ffb454' stroke-width='1'/><text x='260.0' y='281.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11'>block · ToolCall</text><rect x='110' y='300' width='300' height='30' rx='6' fill='#1a2230' stroke='#ffb454' stroke-width='1'/><text x='260.0' y='319.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11'>block · ToolResult</text><rect x='110' y='338' width='300' height='30' rx='6' fill='#1a2230' stroke='#7c5cff' stroke-width='1'/><text x='260.0' y='357.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11'>block · Thinking</text><rect x='110' y='376' width='300' height='30' rx='6' fill='#1a2230' stroke='#ff6b9d' stroke-width='1'/><text x='260.0' y='395.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11'>block · Drift</text><text x='285' y='432' text-anchor='middle' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>BlockStore — one DTE doc per block · order_key sorts the timeline</text><rect x='620' y='86' width='330' height='360' rx='8' fill='#101822' stroke='#4a9eff' stroke-width='1.5'/><text x='785.0' y='271.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='15' font-weight='600'></text><text x='640' y='114' text-anchor='start' fill='#4a9eff' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='15' font-weight='600'>CONVERSATION  (live)</text><text x='640' y='132' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='400'>append-only Vec&lt;Message&gt; · shipped to the LLM</text><rect x='648' y='150' width='274' height='36' rx='6' fill='#1a2230' stroke='#4a9eff' stroke-width='1'/><text x='785.0' y='172.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='12'>User</text><rect x='648' y='196' width='274' height='36' rx='6' fill='#1a2230' stroke='#7c5cff' stroke-width='1'/><text x='785.0' y='218.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='12'>Assistant</text><rect x='648' y='242' width='274' height='36' rx='6' fill='#1a2230' stroke='#ffb454' stroke-width='1'/><text x='785.0' y='264.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='12'>User (tool_result)</text><rect x='648' y='288' width='274' height='36' rx='6' fill='#1a2230' stroke='#7c5cff' stroke-width='1'/><text x='785.0' y='310.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='12'>Assistant</text><text x='785' y='360' text-anchor='middle' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11' font-weight='600'>ConversationMailbox</text><text x='785' y='378' text-anchor='middle' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>materialized per turn</text><text x='785' y='408' text-anchor='middle' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>thinking signatures preserved</text><line x1='520' y1='250' x2='618' y2='250' stroke='#3ddc97' stroke-width='3'  marker-end='url(#ahg)'/><text x='569' y='238' text-anchor='middle' fill='#3ddc97' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='12' font-weight='600'>hydrate</text><text x='569' y='300' text-anchor='middle' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>at boundary</text><text x='569' y='316' text-anchor='middle' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>events:</text><text x='569' y='332' text-anchor='middle' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>fork · new</text><text x='569' y='348' text-anchor='middle' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>cold start</text><text x='569' y='364' text-anchor='middle' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>attach</text><rect x='50' y='470' width='900' height='96' rx='8' fill='#1a2230' stroke='#ffb454' stroke-width='1.5'/><text x='500.0' y='523.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='15' font-weight='600'></text><text x='70' y='498' text-anchor='start' fill='#ffb454' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='13' font-weight='600'>Remediation:  block exclude / block edit  act on the CONTEXT only</text><text x='70' y='520' text-anchor='start' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11' font-weight='400'>They do NOT change a conversation already in flight. To clean a poisoned turn: exclude in context, then fork —</text><text x='70' y='538' text-anchor='start' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11' font-weight='400'>fork_document_filtered drops curated-out blocks and hydrates a fresh, clean conversation.</text><text x='70' y='556' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>(this is why exclude/edit 'take effect at the next fork')</text></svg>