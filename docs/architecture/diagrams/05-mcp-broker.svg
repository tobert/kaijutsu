y='DejaVu Sans, Liberation Sans, sans-serif' font-size='14' font-weight='600'>External MCP servers</text><text x='540' y='464' text-anchor='start' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11' font-weight='400'>ExternalMcpServer wraps an rmcp client over:</text><rect x='540' y='476' width='180' height='30' rx='8' fill='#1a2230' stroke='#3a4a5e' stroke-width='1.5'/><text x='630.0' y='495.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11'>stdio (child process)</text><rect x='730' y='476' width='200' height='30' rx='8' fill='#1a2230' stroke='#3a4a5e' stroke-width='1.5'/><text x='830.0' y='495.0' text-anchor='middle' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11'>streamable-HTTP</text><text x='540' y='528' text-anchor='start' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11' font-weight='400'>Injects identity into every call's _meta:</text><text x='540' y='546' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='400'>principal_id · context_id · W3C traceparent</text><text x='540' y='570' text-anchor='start' fill='#ffb454' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='400'>reconnect is manual-only (Phase 1) · admin offline</text><line x1='501.0' y1='400' x2='300' y2='410' stroke='#8a9bb0' stroke-width='1.4' marker-end='url(#ah)'/><line x1='501.0' y1='400' x2='640' y2='410' stroke='#8a9bb0' stroke-width='1.4' marker-end='url(#ah)'/><text x='500' y='624' text-anchor='middle' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='400'>Capability binding = positive allow-set, deny by default · humans and agents are gated identically (keyed on the context)</text></svg>