<svg xmlns='http://www.w3.org/2000/svg' width='1000' height='760' viewBox='0 0 1000 760'><rect width='1000' height='760' fill='#0f1419'/><defs><marker id='ah' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L6,3 L0,6 Z' fill='#8a9bb0'/></marker><marker id='ahl' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#ffb454'/></marker></defs><text x='26' y='38' text-anchor='start' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='21' font-weight='600'>How a turn flows — prompt to pixels</text><text x='26' y='58' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='12' font-weight='400'>the agentic loop in kaijutsu-server, writing CRDT blocks the whole way</text><rect x='210' y='92' width='600' height='60' rx='9' fill='#1a2230' stroke='#4a9eff' stroke-width='1.6'/><circle cx='236' cy='122.0' r='15' fill='#4a9eff'/><text x='236' y='127.0' text-anchor='middle' fill='#0f1419' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='14' font-weight='700'>1</text><text x='262' y='114' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='13.5' font-weight='600'>Client sends prompt</text><text x='262' y='132' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5'>app submits over RPC → KernelImpl::prompt</text><rect x='684' y='110.0' width='116' height='24' rx='12' fill='#222d3d' stroke='#4a9eff' stroke-width='1'/><text x='742' y='126.0' text-anchor='middle' fill='#4a9eff' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='600'>client → server</text><line x1='510.0' y1='152' x2='510.0' y2='168' stroke='#8a9bb0' stroke-width='1.6' marker-end='url(#ah)'/><rect x='210' y='168' width='600' height='60' rx='9' fill='#1a2230' stroke='#7c5cff' stroke-width='1.6'/><circle cx='236' cy='198.0' r='15' fill='#7c5cff'/><text x='236' y='203.0' text-anchor='middle' fill='#0f1419' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='14' font-weight='700'>2</text><text x='262' y='190' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='13.5' font-weight='600'>Gate + record</text><text x='262' y='208' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5'>facade capability check, insert user msg as a block</text><rect x='684' y='186.0' width='116' height='24' rx='12' fill='#222d3d' stroke='#7c5cff' stroke-width='1'/><text x='742' y='202.0' text-anchor='middle' fill='#7c5cff' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='600'>server</text><line x1='510.0' y1='228' x2='510.0' y2='244' stroke='#8a9bb0' stroke-width='1.6' marker-end='url(#ah)'/><rect x='210' y='244' width='600' height='60' rx='9' fill='#1a2230' stroke='#7c5cff' stroke-width='1.6'/><circle cx='236' cy='274.0' r='15' fill='#7c5cff'/><text x='236' y='279.0' text-anchor='middle' fill='#0f1419' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='14' font-weight='700'>3</text><text x='262' y='266' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='13.5' font-weight='600'>Hydrate</text><text x='262' y='284' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5'>build mailbox (full/windowed) + resolve images</text><rect x='684' y='262.0' width='116' height='24' rx='12' fill='#222d3d' stroke='#7c5cff' stroke-width='1'/><text x='742' y='278.0' text-anchor='middle' fill='#7c5cff' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='600'>server</text><line x1='510.0' y1='304' x2='510.0' y2='320' stroke='#8a9bb0' stroke-width='1.6' marker-end='url(#ah)'/><rect x='210' y='320' width='600' height='60' rx='9' fill='#1a2230' stroke='#ff6b9d' stroke-width='1.6'/><circle cx='236' cy='350.0' r='15' fill='#ff6b9d'/><text x='236' y='355.0' text-anchor='middle' fill='#0f1419' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='14' font-weight='700'>4</text><text x='262' y='342' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='13.5' font-weight='600'>Stream</text><text x='262' y='360' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5'>resolve model, build prompt+tools, provider.stream()</text><rect x='684' y='338.0' width='116' height='24' rx='12' fill='#222d3d' stroke='#ff6b9d' stroke-width='1'/><text x='742' y='354.0' text-anchor='middle' fill='#ff6b9d' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='600'>provider</text><line x1='510.0' y1='380' x2='510.0' y2='396' stroke='#8a9bb0' stroke-width='1.6' marker-end='url(#ah)'/><rect x='210' y='396' width='600' height='60' rx='9' fill='#1a2230' stroke='#3ddc97' stroke-width='1.6'/><circle cx='236' cy='426.0' r='15' fill='#3ddc97'/><text x='236' y='431.0' text-anchor='middle' fill='#0f1419' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='14' font-weight='700'>5</text><text x='262' y='418' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='13.5' font-weight='600'>Write blocks</text><text x='262' y='436' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5'>Thinking/Text deltas → BlockStore; sigs kept</text><rect x='684' y='414.0' width='116' height='24' rx='12' fill='#222d3d' stroke='#3ddc97' stroke-width='1'/><text x='742' y='430.0' text-anchor='middle' fill='#3ddc97' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='600'>CRDT</text><line x1='510.0' y1='456' x2='510.0' y2='472' stroke='#8a9bb0' stroke-width='1.6' marker-end='url(#ah)'/><rect x='210' y='472' width='600' height='60' rx='9' fill='#1a2230' stroke='#ffb454' stroke-width='1.6'/><circle cx='236' cy='502.0' r='15' fill='#ffb454'/><text x='236' y='507.0' text-anchor='middle' fill='#0f1419' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='14' font-weight='700'>6</text><text x='262' y='494' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='13.5' font-weight='600'>Tools</text><text x='262' y='512' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5'>ToolUse → Broker.call_tool → ToolResult block</text><rect x='684' y='490.0' width='116' height='24' rx='12' fill='#222d3d' stroke='#ffb454' stroke-width='1'/><text x='742' y='506.0' text-anchor='middle' fill='#ffb454' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='600'>broker</text><line x1='510.0' y1='532' x2='510.0' y2='548' stroke='#8a9bb0' stroke-width='1.6' marker-end='url(#ah)'/><rect x='210' y='548' width='600' height='60' rx='9' fill='#1a2230' stroke='#4a9eff' stroke-width='1.6'/><circle cx='236' cy='578.0' r='15' fill='#4a9eff'/><text x='236' y='583.0' text-anchor='middle' fill='#0f1419' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='14' font-weight='700'>7</text><text x='262' y='570' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='13.5' font-weight='600'>Fan-out</text><text x='262' y='588' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5'>each mutation → FlowBus → events channel</text><rect x='684' y='566.0' width='116' height='24' rx='12' fill='#222d3d' stroke='#4a9eff' stroke-width='1'/><text x='742' y='582.0' text-anchor='middle' fill='#4a9eff' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='600'>server → client</text><line x1='510.0' y1='608' x2='510.0' y2='624' stroke='#8a9bb0' stroke-width='1.6' marker-end='url(#ah)'/><rect x='210' y='624' width='600' height='60' rx='9' fill='#1a2230' stroke='#3ddc97' stroke-width='1.6'/><circle cx='236' cy='654.0' r='15' fill='#3ddc97'/><text x='236' y='659.0' text-anchor='middle' fill='#0f1419' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='14' font-weight='700'>8</text><text x='262' y='646' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='13.5' font-weight='600'>Render</text><text x='262' y='664' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5'>SyncedDocument → cells → vello/MSDF textures</text><rect x='684' y='642.0' width='116' height='24' rx='12' fill='#222d3d' stroke='#3ddc97' stroke-width='1'/><text x='742' y='658.0' text-anchor='middle' fill='#3ddc97' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='600'>client</text><path d='M 810 502.0 H 832 V 350.0 H 810' fill='none' stroke='#ffb454' stroke-width='1.8' marker-end='url(#ahl)'/><text x='838' y='420.0' text-anchor='start' fill='#ffb454' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='11' font-weight='600'>agentic loop</text><text x='838' y='435.0' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>consent-capped</text><text x='838' y='449.0' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>50 / 100 iters</text><rect x='26' y='430' width='160' height='152' rx='9' fill='#1a2230' stroke='#7c5cff' stroke-width='1.4'/><text x='34' y='452' text-anchor='start' fill='#7c5cff' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='600'>COMPOSER LOOP</text><text x='34' y='470' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>(Chameleon)</text><text x='34' y='494' text-anchor='start' fill='#d4dce6' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10.5' font-weight='400'>beat scheduler</text><text x='34' y='510' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>drives playhead,</text><text x='34' y='524' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>fires tick rc verb,</text><text x='34' y='538' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>requests turn via</text><text x='34' y='552' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>TurnFlow, crystallizes</text><text x='34' y='566' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>ABC cell one phrase</text><text x='34' y='580' text-anchor='start' fill='#8a9bb0' font-family='DejaVu Sans, Liberation Sans, sans-serif' font-size='10' font-weight='400'>ahead</text></svg>