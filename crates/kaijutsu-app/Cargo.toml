[package]
name = "kaijutsu-app"
version.workspace = true
edition.workspace = true
description = "Bevy GUI client for kaijutsu"

[dependencies]
kaijutsu-abc.workspace = true
kaijutsu-crdt.workspace = true
kaijutsu-client.workspace = true
kaijutsu-kernel.workspace = true
kaijutsu-types.workspace = true
kaijutsu-telemetry.workspace = true

# kaish (for syntax validation)
kaish-kernel.workspace = true
logos = "0.16"

bevy = { version = "0.18", features = ["default", "bevy_ui_debug"] }
bevy_brp_extras.workspace = true
bevy_mesh.workspace = true
bevy_remote.workspace = true
bevy_tweening = { git = "https://github.com/djeedai/bevy_tweening", branch = "main" }
avian2d = "0.5"

# Text rendering (Vello-based + MSDF)
bevy_vello = { path = "/home/atobey/src/wt/pr6", features = ["text", "svg", "picking"] }
pulldown-cmark.workspace = true
bytemuck = { version = "1.21", features = ["derive"] }
msdfgen = { path = "/home/atobey/src/msdfgen-rs", default-features = false, features = ["ttf-parser"] }
ttf-parser = "0.19"
rect_packer = "0.2"

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
postcard = { workspace = true, features = ["alloc"] }

# Tracing
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }

thiserror.workspace = true
arboard.workspace = true
modalkit.workspace = true
editor-types.workspace = true
crossterm.workspace = true
clap.workspace = true
tokio.workspace = true
tokio-util.workspace = true
futures.workspace = true
log.workspace = true
whoami.workspace = true
indexmap = { workspace = true }
uuid = { workspace = true }
dirs = { workspace = true }
hostname = { workspace = true }

# Cap'n Proto
capnp.workspace = true
capnp-rpc.workspace = true

# Scripting
rhai.workspace = true
kaijutsu-rhai.workspace = true

[dev-dependencies]
image = "0.25"
crossbeam-channel = "0.5"
