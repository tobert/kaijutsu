# Kaijutsu Default Theme — Synthwave
#
# The app-wide identity (docs/color.md): deep indigo-violet grounds, electric
# violet + gold two-tone, neon accents. One identity, two lanes — these flat
# keys + [ansi] are the sRGB UI lane; [scene.*] is the linear-HDR scene lane.
# Colors are hex strings: "#rrggbb" or "#rrggbbaa" (with alpha).

# Base UI
bg = "#131020"
panel_bg = "#131020f2"
fg = "#d8d2ee"
fg_dim = "#6f6592"
accent = "#a487ff"
accent2 = "#ffcf7d"
border = "#3d3260"
selection_bg = "#a487ff4d"

# Row type colors (conversation left borders)
row_tool = "#d18bff"
row_result = "#e8b45e"

# Semantic colors
error = "#ff5c8a"
warning = "#ffb45e"
success = "#4ce0b3"

# Mode colors (vim-style indicator text)
mode_normal = "#a487ff"
mode_insert = "#4ce0b3"
mode_chat = "#4ce0b3"
mode_shell = "#e8b45e"
mode_visual = "#ff7ad9"

# Mode labels (dock HUD text)
mode_label_normal = "NORMAL"
mode_label_insert = "INSERT"
mode_label_visual = "VISUAL"
mode_label_shell = "SHELL"
mode_label_constellation = "CONSTELLATION"
mode_label_stack = "STACK"
mode_label_input = "INPUT"

# Cursor colors [r, g, b, a]
cursor_normal = [0.643, 0.529, 1.000, 0.8]
cursor_insert = [0.298, 0.878, 0.702, 0.9]
cursor_visual = [1.000, 0.478, 0.851, 0.7]
cursor_replace = [1.000, 0.700, 0.360, 0.85]

# Frame structure
frame_corner_size = 16.0
frame_edge_thickness = 2.0
frame_content_padding = 12.0

# Frame colors
frame_base = "#131020f2"
frame_focused = "#a487ff26"
frame_insert = "#4ce0b31f"
frame_visual = "#ff7ad91f"
frame_unfocused = "#131020cc"
frame_edge = "#3d326099"

# Frame shader params [intensity, _, _, _]
frame_params_base = [0.0, 0.0, 0.0, 0.0]
frame_params_focused = [0.3, 0.0, 0.0, 0.0]
frame_params_unfocused = [0.0, 0.0, 0.0, 0.0]

# Edge dimming [r, g, b, a] multipliers
frame_edge_dim_unfocused = [0.5, 0.5, 0.5, 0.6]
frame_edge_dim_focused = [1.0, 1.0, 1.0, 1.0]

# Shader effects — glow
effect_glow_radius = 4.0
effect_glow_intensity = 0.3
effect_glow_falloff = 2.0

# Shader effects — sheen (subtle shine)
effect_sheen_speed = 0.5
effect_sheen_sparkle_threshold = 0.95

# Shader effects — breathing (subtle pulse)
effect_breathe_speed = 1.0
effect_breathe_amplitude = 0.05

# Shader effects — chasing border
effect_chase_speed = 2.0
effect_chase_width = 0.15
effect_chase_glow_radius = 8.0
effect_chase_glow_intensity = 0.5
effect_chase_color_cycle = 0.0

# Input area
input_minimized_height = 48.0
input_docked_height = 200.0
input_overlay_width_pct = 0.6
input_backdrop_color = "#131020d9"

# Font configuration
font_rainbow = true
font_mono = "Cascadia Code NF"
font_serif = "Noto Serif"
font_sans = "Noto Sans CJK JP"

# MSDF text rendering quality
msdf_hint_amount = 0.8
msdf_stem_darkening = 0.15
msdf_horz_scale = 1.1
msdf_vert_scale = 0.6
msdf_text_bias = 0.5
msdf_gamma_correction = 0.85

# Constellation view
constellation_base_radius = 500.0
constellation_ring_spacing = 550.0

# Block borders
block_border_tool_call = "#e8b45e99"
block_border_tool_result = "#4ce0b366"
block_border_error = "#ff2d6ecc"
block_border_thinking = "#7a6aa04d"
block_border_drift = "#c476e180"
block_border_thickness = 1.5
block_border_corner_radius = 4.0
block_border_glow_radius = 6.0
block_border_glow_intensity = 0.25
text_glow_radius = 2.5
text_glow_color = "#cbb8ff59"
block_border_padding = 0.6
block_spacing = 12.0

# Compose block (input area)
compose_border = "#3d3260"
compose_bg = "#131020"

# Modal overlays
modal_backdrop = "#00000099"

# User/assistant text block borders (transparent = disabled)
block_border_user = "#00000000"
block_border_assistant = "#00000000"

# Layout spacing
indent_width = 24.0
role_header_height = 20.0
role_header_spacing = 4.0
label_font_size = 11.0
label_inset = 12.0
label_pad = 6.0

# ─── Tables below here (TOML: tables must come after all flat keys) ───

# ANSI terminal colors
[ansi]
black = "#16121f"
red = "#ff5c8a"
green = "#4ce0b3"
yellow = "#ffcf7d"
blue = "#a487ff"
magenta = "#ff7ad9"
cyan = "#7de0ff"
white = "#cdc6e6"
bright_black = "#453a66"
bright_red = "#ff7aa2"
bright_green = "#6bf0c9"
bright_yellow = "#ffe0a1"
bright_blue = "#bda4ff"
bright_magenta = "#ff9ae4"
bright_cyan = "#a5ecff"
bright_white = "#ece7fa"

# ─── The 3D scene lane (docs/color.md) ─────────────────────────────────────
# Identity hues as sRGB hex — the app linearizes them for the HDR pipeline.
# Brightness lives in [scene.tiers]; hues keep their brightest channel near
# full. [scene.post] applies LIVE on theme change; hues/tiers apply at the
# next room entry.

[scene.hues]
bg = "#05070b"             # the octagon's void (room clear color)
gold = "#ffe59e"           # the room's one metal
brass = "#ddc489"          # sockets, pegs, jacks
violet_glass = "#55386c"   # information-violet: radiator glass
violet_thread = "#c476e1"  # information-violet: threads/content
neon = "#ad95f3"           # the well's electric indigo-violet
terrace = "#c4b3f9"        # terrace glyphs: paler tint of neon
wire = "#ff5f73"           # patch-bay chord (HDR gain in [scene.gains])
trace_crimson = "#86424b"  # floor trace fabrics, one hue per fabric
trace_cyan = "#3f737e"
trace_green = "#598b6c"
trace_gold = "#958159"
table = "#32353f"          # structural near-blacks
wall_base = "#464556"
wall_mullion = "#383844"
dark_surface = "#1d1e26"

[scene.tiers]
etch = 0.28          # engraved detail
marker = 0.42        # station markers at rest
trim = 0.50          # gold architectural trim
hardware = 0.55      # brass hardware
crest = 1.25         # ceiling for any decoration crest (>1.0 blooms softly)
trough_wiring = 0.55 # floor traces at rest
trough_wall_trim = 0.60
trough_pads = 0.65
trough_subtle = 0.75 # the calmest breathers
# invariant (tested): every trough × crest < 1.0

[scene.gains]
pulse = 6.0          # patch-bay traffic packet peak
chord_selected = 3.4
wire = 1.4           # chord wire resting HDR
beat = 2.8           # tracker marker beat thump
active = 0.5
focus_lift = 0.35
reading_border = 1.6
hud_border = 1.8

[scene.post]
bloom_intensity = 0.22
bloom_low_frequency_boost = 0.25
# one of: tony_mc_mapface | aces | agx | blender_filmic | reinhard |
#         reinhard_luminance | somewhat_boring | none
tonemapper = "aces"
